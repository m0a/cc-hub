<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CC Hub Glasses - Verify</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #111; color: #eee; padding: 16px; }
    h1 { font-size: 20px; margin-bottom: 16px; }
    h2 { font-size: 16px; margin: 16px 0 8px; color: #0f0; }
    .card { background: #222; border-radius: 8px; padding: 12px; margin-bottom: 12px; }
    .status { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 8px; }
    .ok { background: #0f0; }
    .fail { background: #f00; }
    .pending { background: #ff0; }
    .log { background: #000; color: #0f0; font-family: monospace; font-size: 12px; padding: 8px; border-radius: 4px; min-height: 60px; white-space: pre-wrap; max-height: 200px; overflow-y: auto; }
    input { width: 100%; padding: 8px; border-radius: 4px; border: 1px solid #444; background: #333; color: #eee; font-size: 14px; margin: 4px 0; }
    button { padding: 8px 16px; border-radius: 4px; border: none; background: #0a0; color: #fff; font-size: 14px; cursor: pointer; margin: 4px 4px 4px 0; }
    button:active { background: #080; }
    .small { font-size: 12px; color: #888; }
    #glasses-ui { display: none; }
  </style>
</head>
<body>
  <!-- Phone UI (default) -->
  <div id="phone-ui">
    <h1>CC Hub Glasses 確認ツール</h1>

    <!-- 1. Launch Source -->
    <div class="card">
      <h2>1. 起動元</h2>
      <div id="launch-source">検出中...</div>
    </div>

    <!-- 2. Events -->
    <div class="card">
      <h2>2. イベント (リング/テンプル)</h2>
      <p class="small">タップ・ダブルタップ・スワイプを試してください</p>
      <div class="log" id="event-log">イベント待ち...</div>
      <div style="margin-top:8px">
        <span>タップ: <span id="tap-count">0</span></span> |
        <span>ダブルタップ: <span id="dbl-count">0</span></span> |
        <span>スワイプ: <span id="swipe-count">0</span></span>
      </div>
    </div>

    <!-- 3. HTTPS Test -->
    <div class="card">
      <h2>3. HTTPS接続テスト</h2>
      <input id="url-input" type="url" placeholder="https://hostname.tail*****.ts.net:5923" />
      <button id="url-test">接続テスト</button>
      <div id="url-result"></div>
    </div>

    <!-- 4. LocalStorage -->
    <div class="card">
      <h2>4. LocalStorage 共有テスト</h2>
      <input id="ls-key" type="text" value="cchub-url" placeholder="キー" />
      <input id="ls-value" type="text" placeholder="保存する値" />
      <button id="ls-save">保存</button>
      <button id="ls-load">読み取り</button>
      <div id="ls-result"></div>
    </div>

    <!-- 5. Form Input -->
    <div class="card">
      <h2>5. フォーム入力テスト</h2>
      <input id="form-test" type="text" placeholder="ここにテキスト入力..." />
      <div id="form-result" class="small"></div>
    </div>

    <!-- 6. Device Info -->
    <div class="card">
      <h2>6. デバイス情報</h2>
      <div id="device-info">取得中...</div>
    </div>
  </div>

  <!-- Glasses UI -->
  <div id="glasses-ui">
    <div style="background:#000; color:#0f0; font-family:monospace; padding:8px; font-size:14px;">
      <div id="g2-content">CC Hub Glasses Verify</div>
    </div>
  </div>

  <script type="module">
    import {
      waitForEvenAppBridge,
      TextContainerProperty,
      CreateStartUpPageContainer,
      OsEventTypeList,
      EventSourceType,
    } from '@evenrealities/even_hub_sdk'

    const eventLog = []
    let tapCount = 0, dblCount = 0, swipeCount = 0
    let bridge = null

    function log(msg) {
      const ts = new Date().toLocaleTimeString()
      eventLog.unshift(`[${ts}] ${msg}`)
      if (eventLog.length > 20) eventLog.pop()
      const el = document.getElementById('event-log')
      if (el) el.textContent = eventLog.join('\n')
    }

    function setResult(id, html) {
      const el = document.getElementById(id)
      if (el) el.innerHTML = html
    }

    // Init bridge
    try {
      bridge = await Promise.race([
        waitForEvenAppBridge(),
        new Promise((_, reject) => setTimeout(() => reject(new Error('timeout')), 5000)),
      ])
      log('Bridge OK')
    } catch (e) {
      log('Bridge: ' + e.message + ' (ブラウザデバッグモード)')
    }

    // 1. Launch Source
    if (bridge) {
      bridge.onLaunchSource((source) => {
        setResult('launch-source', `<span class="status ok"></span>${source}`)
        log('LaunchSource: ' + source)

        if (source === 'glassesMenu') {
          // Switch to glasses UI
          document.getElementById('phone-ui').style.display = 'none'
          document.getElementById('glasses-ui').style.display = 'block'
          setupGlassesUI()
        }
      })
      setResult('launch-source', '<span class="status pending"></span>Bridge OK, LaunchSource待ち...')
    } else {
      setResult('launch-source', '<span class="status pending"></span>SDKなし (ブラウザモード)')
    }

    // 2. Events
    if (bridge) {
      bridge.onEvenHubEvent((event) => {
        const raw = JSON.stringify(event)

        // Identify event
        const textType = event.textEvent?.eventType
        const sysType = event.sysEvent?.eventType
        const listType = event.listEvent?.eventType
        const eventType = textType ?? sysType ?? listType
        const source = event.textEvent ? 'text' : event.sysEvent ? 'sys' : event.listEvent ? 'list' : '?'
        const eventSource = event.sysEvent?.eventSource ?? event.textEvent?.containerID

        // Detect ring tap (sysEvent with undefined eventType)
        const isRingTap = event.sysEvent && sysType == null && !event.sysEvent.imuData

        let name = 'unknown'
        if (isRingTap) {
          name = 'RING_TAP (eventType=undefined)'
          tapCount++
        } else if (eventType === OsEventTypeList.CLICK_EVENT) {
          name = 'CLICK_EVENT (0)'
          tapCount++
        } else if (eventType === OsEventTypeList.DOUBLE_CLICK_EVENT) {
          name = 'DOUBLE_CLICK_EVENT (3)'
          dblCount++
        } else if (eventType === OsEventTypeList.SCROLL_TOP_EVENT) {
          name = 'SCROLL_TOP_EVENT (1)'
          swipeCount++
        } else if (eventType === OsEventTypeList.SCROLL_BOTTOM_EVENT) {
          name = 'SCROLL_BOTTOM_EVENT (2)'
          swipeCount++
        } else if (eventType === OsEventTypeList.IMU_DATA_REPORT) {
          return // Skip IMU spam
        } else {
          name = `type=${eventType}`
        }

        const srcName = {
          [EventSourceType.TOUCH_EVENT_FROM_RING]: 'RING',
          [EventSourceType.TOUCH_EVENT_FROM_GLASSES_R]: 'GLASSES_R',
          [EventSourceType.TOUCH_EVENT_FROM_GLASSES_L]: 'GLASSES_L',
        }[eventSource] || `src=${eventSource}`

        log(`${source}:${name} [${srcName}]`)

        document.getElementById('tap-count').textContent = tapCount
        document.getElementById('dbl-count').textContent = dblCount
        document.getElementById('swipe-count').textContent = swipeCount

        // Update glasses UI if visible
        updateGlassesContent(`Last: ${name}\n${srcName}\nTap:${tapCount} Dbl:${dblCount} Swipe:${swipeCount}`)
      })
    }

    // 3. HTTPS Test
    document.getElementById('url-test').addEventListener('click', async () => {
      const url = document.getElementById('url-input').value.trim()
      if (!url) {
        setResult('url-result', '<span class="status fail"></span>URLを入力してください')
        return
      }
      setResult('url-result', '<span class="status pending"></span>接続中...')
      try {
        const res = await fetch(url + '/api/dashboard', { signal: AbortSignal.timeout(5000) })
        if (res.ok) {
          const data = await res.json()
          setResult('url-result',
            `<span class="status ok"></span>接続成功! v${data.version || '?'}, セッション数取得中...`)
          // Try sessions
          const sRes = await fetch(url + '/api/sessions')
          if (sRes.ok) {
            const sData = await sRes.json()
            setResult('url-result',
              `<span class="status ok"></span>接続成功! v${data.version || '?'}, ${sData.sessions?.length || 0}セッション`)
          }
        } else {
          setResult('url-result', `<span class="status fail"></span>HTTP ${res.status}`)
        }
      } catch (e) {
        setResult('url-result', `<span class="status fail"></span>${e.message}`)
      }
    })

    // 4. LocalStorage
    document.getElementById('ls-save').addEventListener('click', async () => {
      const key = document.getElementById('ls-key').value
      const value = document.getElementById('ls-value').value
      if (bridge) {
        const ok = await bridge.setLocalStorage(key, value)
        setResult('ls-result', ok
          ? `<span class="status ok"></span>保存OK: ${key} = "${value}"`
          : `<span class="status fail"></span>保存失敗`)
      } else {
        localStorage.setItem(key, value)
        setResult('ls-result', `<span class="status ok"></span>ブラウザlocalStorage保存: ${key} = "${value}"`)
      }
    })

    document.getElementById('ls-load').addEventListener('click', async () => {
      const key = document.getElementById('ls-key').value
      if (bridge) {
        const value = await bridge.getLocalStorage(key)
        setResult('ls-result', value
          ? `<span class="status ok"></span>読み取り: ${key} = "${value}"`
          : `<span class="status pending"></span>値なし (空文字)`)
      } else {
        const value = localStorage.getItem(key)
        setResult('ls-result', value
          ? `<span class="status ok"></span>ブラウザlocalStorage: ${key} = "${value}"`
          : `<span class="status pending"></span>値なし`)
      }
    })

    // 5. Form Input
    document.getElementById('form-test').addEventListener('input', (e) => {
      setResult('form-result', `入力OK: "${e.target.value}"`)
    })

    // 6. Device Info
    if (bridge) {
      try {
        const [user, device] = await Promise.all([
          bridge.getUserInfo().catch(() => null),
          bridge.getDeviceInfo().catch(() => null),
        ])
        const lines = []
        if (user) lines.push(`User: ${user.name} (uid:${user.uid})`)
        if (device) lines.push(`Device: ${device.model}`, `Status: ${device.status?.connectType}`)
        lines.push(`UserAgent: ${navigator.userAgent.slice(0, 80)}`)
        setResult('device-info', lines.join('<br>'))
      } catch (e) {
        setResult('device-info', 'Error: ' + e.message)
      }
    } else {
      setResult('device-info', `UserAgent: ${navigator.userAgent.slice(0, 80)}<br>SDKなし (ブラウザモード)`)
    }

    // Glasses UI (when launched from glassesMenu)
    function setupGlassesUI() {
      if (!bridge) return
      const W = 576
      bridge.createStartUpPageContainer(new CreateStartUpPageContainer({
        containerTotalNum: 4,
        textObject: [
          new TextContainerProperty({
            xPosition: 0, yPosition: 0, width: W, height: 40,
            containerID: 1, containerName: 'title',
            isEventCapture: 0,
            content: 'Event Verify',
          }),
          new TextContainerProperty({
            xPosition: 0, yPosition: 48, width: W, height: 100,
            containerID: 2, containerName: 'log',
            isEventCapture: 0,
            content: 'Tap/Swipe to test',
          }),
          new TextContainerProperty({
            xPosition: 0, yPosition: 156, width: W, height: 100,
            containerID: 3, containerName: 'count',
            isEventCapture: 0,
            content: 'Tap:0 Dbl:0 Swipe:0',
          }),
          new TextContainerProperty({
            xPosition: 0, yPosition: 260, width: W, height: 28,
            containerID: 4, containerName: 'footer',
            isEventCapture: 1,
            content: 'Waiting...',
          }),
        ],
      }))
    }

    function updateGlassesContent(text) {
      const el = document.getElementById('g2-content')
      if (el) el.textContent = text
      // Also update G2 display if bridge available
      if (bridge) {
        import('@evenrealities/even_hub_sdk').then(({ TextContainerUpgrade }) => {
          bridge.textContainerUpgrade(new TextContainerUpgrade({
            containerID: 3, containerName: 'count',
            content: `Tap:${tapCount} Dbl:${dblCount} Swipe:${swipeCount}`,
          }))
        }).catch(() => {})
      }
    }
  </script>
</body>
</html>
